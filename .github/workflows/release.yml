name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # universal: runs native on Intel + Apple Silicon
            rust_target: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            rust_target: ""
            args: ""
          - platform: windows-latest
            rust_target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - name: Install Tauri system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      # Bundle artifact names come from tauri.conf.json `version`, NOT the tag.
      # Sync it from the pushed tag so assets match the release (e.g. v0.2.2).
      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          echo "Synced bundle version to $VERSION"
      # macOS signing + notarization is OFF until you have a Developer ID cert
      # AND set repo variable ENABLE_APPLE_SIGNING=true. When off, the APPLE_*
      # vars are never defined, so the tauri bundler skips codesign and ships an
      # UNSIGNED build (a defined-but-empty APPLE_CERTIFICATE still triggers a
      # failing `security import`, so it must be absent, not "" ). docs/signing.md
      - name: Configure macOS signing
        if: matrix.platform == 'macos-14' && vars.ENABLE_APPLE_SIGNING == 'true'
        run: |
          {
            echo "APPLE_CERTIFICATE<<__CERT__"
            echo "${{ secrets.APPLE_CERTIFICATE }}"
            echo "__CERT__"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Cliply Exporter ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
