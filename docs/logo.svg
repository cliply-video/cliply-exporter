<svg width="580" height="180" viewBox="0 0 580 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cliply Exporter">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#ffb8d1" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- broadcast field panel -->
  <rect x="1" y="1" width="578" height="178" rx="22" fill="#1a1822" />
  <rect x="1.75" y="1.75" width="576.5" height="176.5" rx="21" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5" />

  <!-- pink glowing C-ring + play mark (matches splash LogoMark) -->
  <g transform="translate(46,46) scale(0.88)" filter="url(#glow)">
    <path d="M73.3 26.7 A33 33 0 1 0 73.3 73.3" stroke="#ffb8d1" stroke-width="9" stroke-linecap="round" fill="none" />
    <path d="M44 33 L71 50 L44 67 Z" fill="#ffb8d1" />
  </g>

  <!-- CLIPLY mono wordmark -->
  <text x="160" y="110" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace" font-size="58" font-weight="700" letter-spacing="10" fill="#f6f4fb">CLIPLY</text>

  <!-- gold EXPORTER channel badge, top-aligned -->
  <g transform="translate(454,60)">
    <rect x="0" y="0" width="98" height="22" rx="2" fill="none" stroke="#e8c200" stroke-opacity="0.4" stroke-width="1" />
    <text x="49" y="16" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="500" letter-spacing="2.2" fill="#e8c200">EXPORTER</text>
  </g>
</svg>
